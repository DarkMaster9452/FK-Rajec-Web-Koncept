{% extends 'base.html' %}

{% block title %}Zmazať tréning – FK Rajec{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 text-center">
      <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:4rem;"></i>
      <h2 class="mt-3 fw-bold">Potvrdiť vymazanie</h2>
      <p class="text-muted">Naozaj chcete zmazať tréning:</p>
      <div class="alert alert-warning">
        <strong>{{ training.title }}</strong><br>
        {{ training.date|date:"d.m.Y H:i" }} – {{ training.location }}
      </div>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger me-2">
          <i class="bi bi-trash me-1"></i>Áno, zmazať
        </button>
        <a href="{% url 'training_detail' training.pk %}" class="btn btn-outline-secondary">Zrušiť</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
